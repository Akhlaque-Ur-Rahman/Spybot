name: CI and deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# PRs: cancel superseded runs. Pushes to main: queue — avoids cancelling a deploy mid-rsync.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Next build runs Prisma during prerender; ephemeral Postgres only for CI (not your server).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-placeholder-not-for-production
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync database schema (for build prerender)
        run: pnpm db:push

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Cache Next.js compiler cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build

  # Deploy: set secrets SSH_PRIVATE_KEY, DEPLOY_HOST (optional DEPLOY_USER, DEPLOY_PATH). Job-level `if` cannot use `secrets` — skip is handled in the step below.
  deploy:
    needs: lint-test-build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Rsync to server and deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::notice::Deploy skipped — add repository secrets SSH_PRIVATE_KEY and DEPLOY_HOST."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          KEYFILE="$HOME/.ssh/ci_deploy_key"
          # File + direct -i is more reliable than ssh-add stdin (avoids libcrypto parse issues on bad pastes).
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' | sed $'1s/^\xef\xbb\xbf//' > "$KEYFILE"
          chmod 600 "$KEYFILE"
          if ! ssh-keygen -y -f "$KEYFILE" >/dev/null 2>&1; then
            echo "::error::SSH_PRIVATE_KEY is not a valid OpenSSH private key (or it has a passphrase). Use the private key matching your Civo key, no passphrase, full BEGIN/END block."
            exit 1
          fi
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          USER="${DEPLOY_USER:-ubuntu}"
          REMOTE="${DEPLOY_PATH:-/var/www/Spybot}"
          SSH_OPTS="-i $KEYFILE -o IdentitiesOnly=yes -o BatchMode=yes"
          rsync -az --delete \
            --exclude node_modules \
            --exclude .next \
            --exclude .env \
            --exclude '.env.*' \
            --exclude .git \
            -e "ssh $SSH_OPTS" \
            ./ "${USER}@${DEPLOY_HOST}:${REMOTE}/"
          ssh $SSH_OPTS "${USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd \"${REMOTE}\"; export NODE_ENV=production; pnpm install --frozen-lockfile; pnpm db:push; pnpm build; if systemctl is-enabled spybot >/dev/null 2>&1; then sudo -n systemctl restart spybot; else echo '::warning::Enable spybot.service once — see deploy/spybot.service'; fi"
          shred -u "$KEYFILE" 2>/dev/null || rm -f "$KEYFILE"
