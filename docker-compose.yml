# Local PostgreSQL for SpyBot — matches .env DATABASE_URL (postgres/postgres, db spybot).
# Host port 5433 avoids clashing with an existing Postgres on 5432.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spybot
    ports:
      - '5433:5432'
    volumes:
      - spybot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d spybot']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  spybot_pgdata:
